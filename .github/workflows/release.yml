name: Build and Publish Release

# Trigger this workflow when you push a tag like "v0.1.0"
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    # Required for `gh release create` to upload assets
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Install 'just' (GitHub runners don't have it)
      - name: Install Just
        run: sudo apt-get update && sudo apt-get install -y just gh
      # 2. Install 'uv' (Using the official Astral action)
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.11.14"

      # 3. Run the justfile, passing the git tag as the version
      - name: Build and Publish
        env:
          # GITHUB_TOKEN is automatically provided by GitHub Actions
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: just publish ${{ github.ref_name }}